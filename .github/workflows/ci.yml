name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-contracts:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.0'
          - '8.3'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint PHP
        run: |
          find linkvitals tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l generate-mo.php

      - name: Run dependency-free contract tests
        run: php tests/run.php

  wordpress-integration:
    name: WordPress ${{ matrix.wordpress }} / PHP ${{ matrix.php }}
    needs: php-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - wordpress: '6.4'
            php: '8.0'
          - wordpress: latest
            php: '8.3'
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress_tests
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      WP_PATH: /tmp/linkvitals-wordpress

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP and WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli
          coverage: none
          tools: wp-cli

      - name: Install WordPress
        run: |
          wp core download --path="$WP_PATH" --version="${{ matrix.wordpress }}"
          if [ "${{ matrix.wordpress }}" != "latest" ]; then
            wp --path="$WP_PATH" core verify-checksums
          fi
          wp --path="$WP_PATH" config create --dbname=wordpress_tests --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306
          wp --path="$WP_PATH" core install --url=http://localhost --title=LinkVitals --admin_user=admin --admin_password=integration-password --admin_email=admin@example.test --skip-email
          mkdir -p "$WP_PATH/wp-content/plugins/linkvitals"
          cp -R linkvitals/. "$WP_PATH/wp-content/plugins/linkvitals/"
          wp --path="$WP_PATH" plugin activate linkvitals

      - name: Run WordPress integration checks
        run: wp --path="$WP_PATH" eval-file "$GITHUB_WORKSPACE/tests/integration/run.php"

      - name: Verify real uninstall cleanup
        run: |
          wp --path="$WP_PATH" plugin deactivate linkvitals
          wp --path="$WP_PATH" plugin uninstall linkvitals
          wp --path="$WP_PATH" eval-file "$GITHUB_WORKSPACE/tests/integration/verify-uninstall.php"

  wordpress-multisite:
    name: WordPress multisite / PHP 8.3
    needs: php-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress_multisite
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      WP_PATH: /tmp/linkvitals-wordpress-multisite

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP and WP-CLI
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
          coverage: none
          tools: wp-cli

      - name: Install WordPress multisite
        run: |
          wp core download --path="$WP_PATH" --version=latest
          wp --path="$WP_PATH" config create --dbname=wordpress_multisite --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306
          wp --path="$WP_PATH" core multisite-install --url=http://localhost --title=LinkVitals-Network --admin_user=admin --admin_password=integration-password --admin_email=admin@example.test --skip-email
          wp --path="$WP_PATH" site create --slug=before-activation --title=Before-Activation --email=before@example.test
          mkdir -p "$WP_PATH/wp-content/plugins/linkvitals"
          cp -R linkvitals/. "$WP_PATH/wp-content/plugins/linkvitals/"
          wp --path="$WP_PATH" plugin activate linkvitals --network
          wp --path="$WP_PATH" site create --slug=after-activation --title=After-Activation --email=after@example.test

      - name: Verify network activation and new-site provisioning
        run: wp --path="$WP_PATH" eval-file "$GITHUB_WORKSPACE/tests/integration/multisite-run.php"

      - name: Verify network deactivation
        run: |
          wp --path="$WP_PATH" plugin deactivate linkvitals --network
          wp --path="$WP_PATH" eval-file "$GITHUB_WORKSPACE/tests/integration/multisite-verify-deactivation.php"

      - name: Verify per-site uninstall retention
        run: |
          wp --path="$WP_PATH" plugin uninstall linkvitals
          wp --path="$WP_PATH" eval-file "$GITHUB_WORKSPACE/tests/integration/multisite-verify-uninstall.php"

  release-validation:
    name: Translations and release package
    needs: php-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Verify translation catalogs are synchronized
        run: |
          python tools/i18n-sync.py
          git diff --exit-code -- linkvitals/languages/linkvitals.pot linkvitals/languages/linkvitals-zh_CN.po

      - name: Verify compiled Chinese translations are current
        run: |
          python generate-mo.py
          git diff --exit-code -- linkvitals/languages/linkvitals-zh_CN.mo

      - name: Build and verify release package
        run: |
          python tools/package-release.py
          python tools/dev-verify.py
